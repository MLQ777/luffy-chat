<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luffy Chat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;display:flex;justify-content:center;padding:8px;font-family:sans-serif;height:100vh}
#app{width:100%;max-width:460px;height:95vh;background:linear-gradient(180deg,#FFF8E1,#FFECB3);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
#hdr{background:#d32f2f;color:#fff;padding:12px;text-align:center;font-weight:bold;font-size:16px;flex-shrink:0}
#chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;background:radial-gradient(ellipse at 20% 30%,rgba(255,193,7,0.06),transparent 60%)}
.msg{padding:8px 12px;border-radius:8px;max-width:85%;line-height:1.6;font-size:14px;word-break:break-word}
.msg.bot{background:#fff;color:#333;align-self:flex-start;border:1px solid #e0e0e0}
.msg.me{background:#0d47a1;color:#fff;align-self:flex-end}
.cns{display:block;margin-top:4px;padding-top:4px;border-top:1px solid rgba(0,0,0,0.08);font-size:12px;color:#888}
#bar{display:flex;gap:6px;padding:8px;background:rgba(255,255,255,0.9);flex-shrink:0}
#bar input{flex:1;padding:8px 12px;border:1px solid #ccc;border-radius:8px;font-size:14px;outline:none}
#bar button{width:38px;height:38px;border:none;border-radius:50%;background:#d32f2f;color:#fff;font-size:14px;cursor:pointer}
#bar button:disabled{opacity:0.5}
.mbtn{position:fixed;bottom:12px;right:12px;width:38px;height:38px;border:none;border-radius:50%;background:#d32f2f;color:#fff;font-size:18px;z-index:100;cursor:pointer}
</style></head><body>
<div id="app">
<div id="hdr">Luffy Chat</div>
<div id="chat"><p style="text-align:center;color:#999;margin-top:60px">Loading...</p></div>
<div id="bar"><input id="inp" placeholder="Talk to Luffy..." onkeydown="if(event.key=='Enter')send()"><button id="btn" onclick="send()">OK</button></div>
</div>
<audio id="au" preload="auto" src="https://music.163.com/song/media/outer/url?id=4950184.mp3" loop></audio>
<button class="mbtn" onclick="mg()">♪</button>
<script>
var API = "https://api.deepseek.com/chat/completions";
var KEY = "sk-64cf45559c63476cb59318f5ae8b6c7f";
var saved = localStorage.getItem("luffyChat");var msgs = saved ? JSON.parse(saved) : [{role:"system",content:"You are Monkey D. Luffy. Speak Japanese casually. After each response, add Chinese translation in << >>."}];
var busy=false;
var ch=document.getElementById("chat");
var ip=document.getElementById("inp");
var chEmpty=ch.innerHTML;

function add(w,t){
  var d=document.createElement("div");d.className="msg "+(w=="b"?"bot":"me");
  var i=t.indexOf("<<");
  if(i>0&&w=="b"){d.innerHTML=t.substr(0,i).trim()+'<span class="cns">'+t.substr(i)+"</span>";}
  else{d.textContent=t;}
  ch.appendChild(d);ch.scrollTop=ch.scrollHeight;
}

function send(){
  var t=ip.value.trim();if(!t||busy)return;
  if(ch.innerHTML==chEmpty)ch.innerHTML="";
  ip.value="";busy=true;document.getElementById("btn").disabled=true;
  msgs.push({role:"user",content:t});add("m",t);
  var x=new XMLHttpRequest();
  x.open("POST",API,true);
  x.setRequestHeader("Content-Type","application/json");
  x.setRequestHeader("Authorization","Bearer "+KEY);
  x.onreadystatechange=function(){
    if(x.readyState==4){
      try{var d=JSON.parse(x.responseText);var r=d.choices[0].message.content;
      msgs.push({role:"assistant",content:r});add("b",r);}
      catch(e){add("b","Error: "+e.message);}
      saveMsgs();busy=false;document.getElementById("btn").disabled=false;ip.focus();
    }
  };
  x.send(JSON.stringify({model:"deepseek-chat",messages:msgs,temperature:0.9,max_tokens:1500}));
}

function saveMsgs(){localStorage.setItem("luffyChat",JSON.stringify(msgs));}
setTimeout(function(){
  if((!saved||JSON.parse(saved).length<=1)&&ch.innerHTML==chEmpty){
    ch.innerHTML="";
    var g="ししし！おれはルフィ！<<嘻嘻嘻！我是路飞！>>";
    msgs.push({role:"assistant",content:g});add("b",g);
  }
},2000);

var ap=false,au=document.getElementById("au");
function mg(){
  if(ap){au.pause();ap=false;}
  else{au.play().then(function(){ap=true;}).catch(function(){});}
}
</script></body></html>
